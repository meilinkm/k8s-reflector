reflector:
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  startupProbe:
    httpGet:
      path: /health/ready
      port: http
    timeoutSeconds: 10
    initialDelaySeconds: 5
    periodSeconds: 10
    # increase from 5 to 20 to allow more time
    failureThreshold: 20

